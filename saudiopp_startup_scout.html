<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SaudiOpp — Startup & SME Scout</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#090b0e;--surf:#10141a;--surf2:#171c25;--bdr:#232b3a;
  --txt:#e8ecf4;--dim:#8896aa;--muted:#4a5568;
  --accent:#c8a96e;--accent2:#e8d5a3;
  --fill:#2ecc71;--acc:#f39c12;--derisk:#3b82f6;
  --av:#e74c3c;--pif:#8E44AD;--sanabil:#2980B9;--tali:#16A085;--global:#4a5568;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
header{display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0;gap:16px}
.logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;letter-spacing:.04em}
.logo span{color:var(--dim);font-weight:400}
.back-link{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);text-decoration:none;margin-left:auto;transition:color .15s}
.back-link:hover{color:var(--accent)}
.header-kpis{display:flex;gap:24px}
.hkpi{text-align:right}
.hkpi-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--accent2)}
.hkpi-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

/* ── Search bar ── */
.search-wrap{padding:20px 20px 0;display:flex;gap:10px;align-items:flex-start;max-width:1400px;margin:0 auto;width:100%}
.search-box{flex:1;position:relative}
.search-box input{width:100%;background:var(--surf);border:1px solid var(--bdr);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:10px 44px 10px 14px;border-radius:4px;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px;pointer-events:none}
.ai-btn{background:var(--accent);color:#000;border:none;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:10px 16px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.ai-btn:hover{background:var(--accent2)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Filters ── */
.filters{padding:12px 20px 0;display:flex;gap:8px;flex-wrap:wrap;max-width:1400px;margin:0 auto;width:100%}
.filter-group{display:flex;align-items:center;gap:6px}
label.f{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);white-space:nowrap}
select.f{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:4px 8px;border-radius:3px;cursor:pointer;height:28px}
select.f:focus{outline:none;border-color:var(--accent)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:1px solid;transition:all .15s}
.chip.active{opacity:1}.chip:not(.active){opacity:.4}
.chip-fill{color:var(--fill);border-color:var(--fill)}
.chip-fill.active{background:rgba(46,204,113,.12)}
.chip-acc{color:var(--acc);border-color:var(--acc)}
.chip-acc.active{background:rgba(243,156,18,.12)}
.chip-derisk{color:var(--derisk);border-color:var(--derisk)}
.chip-derisk.active{background:rgba(59,130,246,.12)}
.sep{color:var(--bdr);font-size:16px;margin:0 2px}

/* Investor chips */
.chip-av{color:var(--av);border-color:var(--av)}
.chip-av.active{background:rgba(231,76,60,.12)}
.chip-pif{color:var(--pif);border-color:var(--pif)}
.chip-pif.active{background:rgba(142,68,173,.12)}
.chip-sanabil{color:var(--sanabil);border-color:var(--sanabil)}
.chip-sanabil.active{background:rgba(41,128,185,.12)}
.chip-tali{color:var(--tali);border-color:var(--tali)}
.chip-tali.active{background:rgba(22,160,133,.12)}
.chip-global{color:var(--dim);border-color:var(--dim)}
.chip-global.active{background:rgba(74,85,104,.15)}

/* ── Results count ── */
.results-meta{padding:10px 20px 0;max-width:1400px;margin:0 auto;width:100%;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);display:flex;align-items:center;gap:12px}
.results-meta em{color:var(--accent2);font-style:normal}

/* ── Grid ── */
.grid{padding:14px 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;max-width:1400px;margin:0 auto;width:100%;flex:1}

/* ── Card ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:5px;overflow:hidden;transition:border-color .15s,transform .1s;cursor:pointer}
.card:hover{border-color:#3a4558;transform:translateY(-1px)}
.card.ai-result{border-color:rgba(200,169,110,.3);background:linear-gradient(180deg,rgba(200,169,110,.04) 0%,var(--surf) 60px)}

.card-head{padding:12px 14px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:10px}
.card-icon{width:36px;height:36px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.card-meta{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.card-hq{font-family:'IBM Plex Mono',monospace;font-size:9px}
.card-stage{font-family:'IBM Plex Mono',monospace;font-size:9px}

.card-body{padding:10px 14px}
.card-tech{font-size:11px;color:#9aa8bc;margin-bottom:8px;line-height:1.5}
.card-reason{font-size:11px;color:#b8c2d0;line-height:1.55;margin-bottom:10px}

.card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge-investor{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px}
.bi-av{background:rgba(231,76,60,.12);color:var(--av);border:1px solid rgba(231,76,60,.25)}
.bi-pif{background:rgba(142,68,173,.12);color:var(--pif);border:1px solid rgba(142,68,173,.25)}
.bi-sanabil{background:rgba(41,128,185,.12);color:var(--sanabil);border:1px solid rgba(41,128,185,.25)}
.bi-tali{background:rgba(22,160,133,.12);color:var(--tali);border:1px solid rgba(22,160,133,.25)}
.bi-global{background:rgba(74,85,104,.15);color:var(--dim);border:1px solid var(--bdr)}
.bi-ai{background:rgba(200,169,110,.1);color:var(--accent);border:1px solid rgba(200,169,110,.25)}
.badge-fit{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px}
.bf-fill{background:rgba(46,204,113,.1);color:var(--fill);border:1px solid rgba(46,204,113,.2)}
.bf-accelerate{background:rgba(243,156,18,.1);color:var(--acc);border:1px solid rgba(243,156,18,.2)}
.bf-de-risk{background:rgba(59,130,246,.1);color:var(--derisk);border:1px solid rgba(59,130,246,.2)}

.node-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.node-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;background:var(--surf2);border:1px solid var(--bdr);color:var(--accent);cursor:pointer}
.node-tag:hover{border-color:var(--accent)}

.presence-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.p-none{background:var(--bdr)}
.p-pilot{background:#f39c12}
.p-active{background:#2ecc71}
.p-hq{background:#2ecc71;box-shadow:0 0 0 2px rgba(46,204,113,.3)}
.presence-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim)}

.card-actions{padding:8px 14px;border-top:1px solid var(--bdr);display:flex;gap:8px}
.action-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;border-radius:2px;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:center;gap:4px}
.ab-primary{background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.25)}
.ab-primary:hover{background:rgba(200,169,110,.2)}
.ab-secondary{background:var(--surf2);color:var(--dim);border:1px solid var(--bdr)}
.ab-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* ── AI search result card ── */
.ai-thinking{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:20px;background:var(--surf);border:1px solid rgba(200,169,110,.2);border-radius:5px}
.ai-spinner{width:20px;height:20px;border:2px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-thinking-txt{font-size:12px;color:var(--dim)}
.ai-thinking-txt em{color:var(--accent);font-style:normal}

/* ── Empty state ── */
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-state .ico{font-size:36px;opacity:.2}
.empty-state p{font-size:13px;color:#8896aa;max-width:300px;line-height:1.6}
.empty-state .hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);opacity:.6}

/* ── Node detail panel (right slide-in) ── */
#detail-panel{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:var(--surf);border-left:1px solid var(--bdr);z-index:100;transition:right .25s ease;display:flex;flex-direction:column;overflow:hidden}
#detail-panel.open{right:0}
.dp-head{padding:16px 18px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:12px}
.dp-close{margin-left:auto;cursor:pointer;color:var(--dim);font-size:18px;line-height:1;flex-shrink:0}.dp-close:hover{color:var(--txt)}
.dp-body{flex:1;overflow-y:auto;padding:0}
.dp-body::-webkit-scrollbar{width:3px}
.dp-body::-webkit-scrollbar-thumb{background:var(--bdr)}
.dp-name{font-size:17px;font-weight:600;color:var(--txt);line-height:1.3}
.dp-meta{font-size:11px;color:var(--dim);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}
.dp-sec{padding:12px 18px;border-bottom:1px solid var(--bdr)}
.dp-sec-t{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:#4a5568;margin-bottom:6px}
.dp-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);margin-bottom:1px}
.dp-cell{padding:8px 12px;background:var(--surf2)}
.dp-cell-k{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:#4a5568;margin-bottom:2px}
.dp-cell-v{font-size:12px;color:var(--accent2);font-weight:500}
.dp-txt{font-size:11px;color:#b8c2d0;line-height:1.65}
.dp-link{color:var(--accent);text-decoration:none;font-size:11px}.dp-link:hover{text-decoration:underline}
.dp-investor-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;font-size:11px;font-weight:600}
.dp-nodes{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dp-node{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;background:var(--surf2);border:1px solid var(--bdr);color:var(--accent)}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
#overlay.open{display:block}
</style>
</head>

<div class="search-wrap">

<div class="filters">

  <div class="chip chip-global active" id="chip-global" onclick="toggleInvChip('Global')">Global</div>
</div>

<div class="results-meta">
  <span><em id="res-count">48</em> companies shown</span>
  <span id="ai-badge" style="display:none;color:var(--accent);font-size:9px">⟡ AI results included</span>
</div>

<div class="grid" id="grid"></div>

<!-- Detail Panel -->
<div id="overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-head">
    <div>
      <div class="dp-name" id="dp-name">—</div>
      <div class="dp-meta" id="dp-meta"></div>
    </div>
    <div class="dp-close" onclick="closeDetail()">✕</div>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

// State
let fitFilters=new Set(['fill','accelerate','de-risk']);
let invFilters=new Set(['Aramco Ventures','PIF','Sanabil','Tali','Global']);
let aiResults=[];

function toggleChip(fit){
  if(fitFilters.has(fit)) fitFilters.delete(fit); else fitFilters.add(fit);
  const map={fill:'chip-fill',accelerate:'chip-acc','de-risk':'chip-derisk'};
  document.getElementById('chip-'+{fill:'fill',accelerate:'acc','de-risk':'derisk'}[fit]).classList.toggle('active',fitFilters.has(fit));
  render();
}

function toggleInvChip(inv){
  const id='chip-'+inv.toLowerCase().split('/')[0].split(' ')[0];
  if(invFilters.has(inv))invFilters.delete(inv);else invFilters.add(inv);
  const el=document.getElementById(id);if(el)el.classList.toggle('active',invFilters.has(inv));
  render();
}

function investorClass(s){
  if(!s)return 'global';
  if(s.includes('Aramco'))return 'av';
  if(s.includes('Sanabil'))return 'sanabil';
  if(s.includes('Tali'))return 'tali';
  if(s.includes('PIF'))return 'pif';
  return 'global';
}

function invFilterMatch(s){
  if(!s) return invFilters.has('Global');
  if(s.includes('Aramco')) return invFilters.has('Aramco Ventures');
  if(s.includes('Sanabil')) return invFilters.has('Sanabil');
  if(s.includes('Tali')) return invFilters.has('Tali');
  if(s.includes('PIF')) return invFilters.has('PIF');
  return invFilters.has('Global');
}

function filterData(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const fn=document.getElementById('f-node').value;
  const fs=document.getElementById('f-sector').value;
  const fst=document.getElementById('f-stage').value;

  return DB.filter(c=>{
    if(!fitFilters.has(c.fit_type)) return false;
    if(!invFilterMatch(c.saudi_investor)) return false;
    if(fn && !c.nodes.includes(fn)) return false;
    if(fs && !c.nodes.some(n=>(NODES_META[n]?.sector||'')===fs)) return false;
    if(fst && !c.stage.includes(fst)) return false;
    if(q){
      const haystack=`${c.name} ${c.description} ${c.technology} ${c.nodes.join(' ')} ${c.fit_reason} ${c.saudi_investor||''}`.toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });
}

        </span>
      </div>
      <div class="node-tags">${nodeTags}</div>
    </div>
    <div class="card-actions">
      <a class="action-btn ab-primary" href="https://${c.website}" target="_blank" onclick="event.stopPropagation()">↗ Website</a>
      <a class="action-btn ab-secondary" href="mailto:?subject=SaudiOpp: ${encodeURIComponent(c.name)}&body=Company: ${encodeURIComponent(c.name)}%0AWebsite: ${encodeURIComponent('https://'+c.website)}%0AFit: ${encodeURIComponent(c.fit_reason)}" onclick="event.stopPropagation()">✉ Share</a>
    </div>
  </div>`;
}

function render(){
  const filtered=filterData();
  document.getElementById('res-count').textContent=filtered.length + aiResults.length;
  document.getElementById('ai-badge').style.display=aiResults.length?'':'none';

  if(!filtered.length && !aiResults.length){
    document.getElementById('grid').innerHTML=`<div class="empty-state">
      <div class="ico">⬡</div>
      <p>No companies match your filters. Try broadening your search or click <strong style="color:var(--accent)">AI Scout</strong> to discover new matches.</p>
      <div class="hint">AI Scout uses Claude to search for startups beyond the curated database</div>
    </div>`;
    return;
  }

  const cards=[...aiResults.map(c=>cardHTML(c,true)),...filtered.map(c=>cardHTML(c))];
  document.getElementById('grid').innerHTML=cards.join('');
}

// Event delegation - handles clicks on all cards including dynamically added AI results
document.getElementById('grid').addEventListener('click', function(e){
  // Walk up to find the card
  let el = e.target;
  while(el && el !== this){
    if(el.dataset && el.dataset.id){
      // Don't trigger if clicking a link or node tag
      if(e.target.tagName === 'A' || e.target.classList.contains('node-tag')) return;
      openDetail(el.dataset.id);
      return;
    }
    el = el.parentElement;
  }
});

function filterByNode(nid){
  document.getElementById('f-node').value=nid;
  render();
}

// ── Detail Panel ──
let allCompanies=[...DB];

function openDetail(id){
  const c=allCompanies.find(x=>x.id===id)||aiResults.find(x=>x.id===id);
  if(!c)return;
  const ic=investorClass(c.saudi_investor);
  const colors={'av':'#e74c3c','pif':'#8E44AD','sanabil':'#2980B9','tali':'#16A085','global':'#4a5568'};
  const col=colors[ic];

  document.getElementById('dp-name').textContent=c.name;
  document.getElementById('dp-meta').innerHTML=`
    <span>${c.hq}${c.city?', '+c.city:''}</span>
    <span>·</span><span>${c.stage}</span>
    ${c.employees?`<span>·</span><span>${c.employees} employees</span>`:''}`;

  const invBadge=c.saudi_investor
    ?`<span class="dp-investor-badge" style="background:${col}18;color:${col};border:1px solid ${col}33">${c.saudi_investor}</span>`
    :`<span class="dp-investor-badge" style="background:var(--surf2);color:var(--dim);border:1px solid var(--bdr)">Global — no Saudi investor</span>`;

  const nodeList=(c.nodes||[]).map(n=>{
    const nm=NODES_META[n];
    return `<span class="dp-node" title="${nm?.title||n}">${n}: ${nm?.title?.slice(0,30)||n}</span>`;
  }).join('');

  const fitLabel={'fill':'● Fill — directly builds the node capability','accelerate':'◎ Accelerate — supplies critical component or technology','de-risk':'○ De-risk — reduces technical or market risk'}[c.fit_type]||c.fit_type;

  document.getElementById('dp-body').innerHTML=`
    <div class="dp-sec">
      <div class="dp-sec-t">Investor Relationship</div>
      ${invBadge}
      ${c.saudi_investor_type?`<div style="font-size:11px;color:var(--dim);margin-top:6px">${c.saudi_investor_type.replace(/_/g,' ')}</div>`:''}
    </div>
    <div class="dp-row"><div class="dp-cell"><div class="dp-cell-k">Total Raised</div><div class="dp-cell-v">${c.total_raised||'N/A'}</div></div>
    <div class="dp-cell"><div class="dp-cell-k">Last Round</div><div class="dp-cell-v">${c.last_round||'—'}</div></div></div>
    <div class="dp-row"><div class="dp-cell"><div class="dp-cell-k">Saudi Presence</div><div class="dp-cell-v">${c.saudi_presence}</div></div>
    <div class="dp-cell"><div class="dp-cell-k">Revenue Stage</div><div class="dp-cell-v">${c.revenue_stage||'—'}</div></div></div>
    <div class="dp-sec">
      <div class="dp-sec-t">Company Description</div>
      <div class="dp-txt">${c.description}</div>
      <div style="margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent)">Core technology: ${c.technology}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-t">PSAP Node Fit — ${fitLabel}</div>
      <div class="dp-txt">${c.fit_reason}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-t">Relevant Nodes (${(c.nodes||[]).length})</div>
      <div class="dp-nodes">${nodeList}</div>
    </div>
    ${c.other_investors?.length?`<div class="dp-sec">
      <div class="dp-sec-t">Other Notable Investors</div>
      <div class="dp-txt">${c.other_investors.join(' · ')}</div>
    </div>`:''}
    <div class="dp-sec">
      <div class="dp-sec-t">Contact & Links</div>
      <a class="dp-link" href="https://${c.website}" target="_blank">↗ ${c.website}</a>
      ${c.contact&&c.contact!='via website'?`<div style="font-size:11px;color:var(--dim);margin-top:4px">${c.contact}</div>`:''}
    </div>
    <div class="dp-sec">
      <div class="dp-sec-t">Data Source</div>
      <div class="dp-txt" style="color:var(--muted)">${c.source==='aramco_ventures_portfolio'?'Aramco Ventures public portfolio':c.source==='pif_portfolio'?'PIF disclosed investments':c.source==='sanabil_portfolio'?'Sanabil Investments portfolio':c.source==='tali_ventures_portfolio'?'Tali Ventures (stc) portfolio':c.source==='ai_search'?'⟡ Claude AI live search':'Istawra curated database'} · Verified ${c.last_verified||'2025'}</div>
    </div>`;

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── AI Scout ──
async function runAISearch(){
  const q=document.getElementById('search-input').value.trim();
  const fn=document.getElementById('f-node').value;
  const fs=document.getElementById('f-sector').value;
  const apiKey=(document.getElementById('api-key-input')?.value||'').trim();

  if(!q && !fn && !fs){
    alert('Enter a search term, select a node, or select a sector first.');return;
  }
  if(!apiKey){
    // Show inline message instead of alert
    const btn=document.getElementById('ai-btn');
    btn.innerHTML='<span>⚠</span> Add API Key';
    btn.style.background='#e74c3c';
    setTimeout(()=>{btn.innerHTML='<span>⟡</span> AI Scout';btn.style.background='var(--accent)';},2500);
    document.getElementById('api-key-input').style.borderColor='#e74c3c';
    document.getElementById('api-key-input').focus();
    return;
  }

  const btn=document.getElementById('ai-btn');
  btn.disabled=true;btn.innerHTML='<span class="ai-spinner" style="display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .8s linear infinite"></span> Searching...';

  let nodeContext='';
  if(fn && NODES_META[fn]){
    const n=NODES_META[fn];
    nodeContext=`\nTarget PSAP Node: ${fn} — ${n.title} (Sector: ${n.sector}, Phase: ${n.phase})`;
  }
  const sectorContext=fs?`\nTarget Sector: ${SECTORS[fs]||fs}`:'';

  const prompt=`You are an investment intelligence analyst for SaudiOpp, a Saudi Arabia industrial investment platform. Find innovative startups and SMEs that could fill, accelerate, or de-risk Saudi Arabia's PSAP industrial capability nodes.
${nodeContext}${sectorContext}
Search query: "${q||('companies relevant to '+((fn&&NODES_META[fn]?.title)||fs||'Saudi industrial investment'))}"

Find 4-6 specific companies (startups, scale-ups, or innovative SMEs) that are relevant. Include companies from Saudi investor portfolios (Aramco Ventures, PIF, Sanabil, Tali/stc) if relevant, as well as global innovators. Consider innovative niche SMEs, not just well-known startups.

Respond ONLY with a valid JSON array, no markdown, no explanation, no code fences:
[{"id":"AI-001","name":"","hq":"","city":"","stage":"","employees":"","website":"","description":"","technology":"","nodes":[],"fit_type":"fill","fit_reason":"","saudi_investor":null,"saudi_investor_type":null,"other_investors":[],"total_raised":"","last_round":"","revenue_stage":"","saudi_presence":"None","contact":"","confidence":"high","source":"ai_search","last_verified":"2025-03-27"}]`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        messages:[{role:'user',content:prompt}]
      })
    });

    if(!resp.ok){
      const errText = await resp.text();
      throw new Error(`API error ${resp.status}: ${errText.slice(0,200)}`);
    }

    const data = await resp.json();
    let text = '';
    for(const block of (data.content||[])){
      if(block.type==='text') text += block.text;
    }

    // Extract JSON array — find first [ and last ]
    const start = text.indexOf('[');
    const end = text.lastIndexOf(']');
    if(start === -1 || end === -1 || end <= start){
      throw new Error('No JSON array found in response');
    }
    const jsonStr = text.slice(start, end+1);
    const companies = JSON.parse(jsonStr);
    companies.forEach((c,i)=>{
      c.id=`AI-${Date.now()}-${i}`;
      if(!c.last_verified) c.last_verified='2025-03-27';
    });
    aiResults = companies;
    allCompanies = [...DB, ...aiResults];
    document.getElementById('ai-badge').style.display='';
  } catch(e){
    console.error('AI Scout error:', e);
    // Show error in grid
    document.getElementById('grid').insertAdjacentHTML('afterbegin',
      `<div style="grid-column:1/-1;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:4px;padding:14px 16px;font-size:12px;color:#e74c3c;font-family:'IBM Plex Mono',monospace">
        ⚠ AI Scout error: ${e.message.slice(0,200)}
        <div style="margin-top:6px;font-size:10px;color:var(--dim)">Check your API key and try again.</div>
      </div>`
    );
  }

  btn.disabled=false;btn.innerHTML='<span>⟡</span> AI Scout';
  render();
}

// Search input live filter
document.getElementById('search-input').addEventListener('input', render);
document.getElementById('f-node').addEventListener('change', render);
document.getElementById('f-sector').addEventListener('change', render);
document.getElementById('f-stage').addEventListener('change', render);

// Enter key triggers AI search
document.getElementById('search-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') runAISearch();
});

// Init
render();
</script>
